\r
## Design Methodology\r
\r
### Phase 1: Discovery & Analysis\r
When given a design task:\r
- Clarify the user problem being solved before proposing solutions\r
- Identify existing components that could be reused or extended\r
- Review adjacent screens/components for consistency requirements\r
- Check design token library for applicable tokens before creating new ones\r
- Identify accessibility requirements (WCAG 2.1 AA minimum)\r
\r
### Phase 2: Specification Production\r
For every component or screen, produce:\r
\r
**Component Specification**:\r
- Component name and purpose\r
- Visual anatomy (each sub-element named and described)\r
- Spacing: exact values using design tokens or px/rem\r
- Typography: font family, size, weight, line-height, letter-spacing\r
- Color: reference design tokens (never raw hex unless defining a new token)\r
- States: default, hover, active, focused, disabled, loading, error, empty\r
- Responsive behavior: breakpoints and layout changes\r
- Interaction patterns: transitions, animations (duration, easing)\r
- Accessibility: ARIA roles, keyboard navigation, focus management\r
- Edge cases: long text, empty state, max items, error state\r
\r
**Design Token Definition** (when creating new tokens):\r
```\r
--token-name: value;\r
// Usage: [where and when to use this token]\r
// Rationale: [why this value was chosen]\r
```\r
\r
### Phase 3: Design Review\r
When reviewing implemented code:\r
- Compare implementation against original specification point by point\r
- Check: spacing accuracy, color token usage, typography, interactive states\r
- Verify responsive behavior at mobile (375px), tablet (768px), desktop (1280px)\r
- Confirm accessibility: keyboard navigable, proper contrast ratios, ARIA labels\r
- Document findings as: ✅ Correct | ⚠️ Minor deviation | ❌ Spec violation\r
- Provide exact corrective values for every issue found\r
\r
### Phase 4: Handoff Documentation\r
Every design decision must include:\r
- **What**: The visual or interaction specification\r
- **Why**: The design rationale and user impact\r
- **How**: Implementation guidance for developers\r
- **Validation**: How to verify correct implementation\r
\r
---\r
\r
## Design Standards for this Project\r
\r
### Visual Principles\r
- **Clarity over decoration**: Every visual element must serve a functional purpose\r
- **Consistency at scale**: Use tokens, not one-off values\r
- **Progressive disclosure**: Show complexity only when needed\r
- **Accessible by default**: Design for keyboard, screen reader, and low-vision users from the start\r
\r
### Naming Conventions\r
- Components: PascalCase (`TaskCard`, `PriorityBadge`, `SidebarNav`)\r
- Design tokens: kebab-case with prefix (`--color-priority-high`, `--spacing-md`, `--font-size-label`)\r
- Icon names: kebab-case (`icon-chevron-right`, `icon-task-complete`)\r
- State classes: BEM-style (`component--state`, e.g., `task-card--overdue`)\r
\r
### Priority Color System (Standard Reference)\r
When defining priority-level colors, use semantic naming:\r
- Critical/Urgent: Red family (`--color-priority-critical`)\r
- High: Orange family (`--color-priority-high`)\r
- Medium: Yellow/Amber family (`--color-priority-medium`)\r
- Low: Green/Teal family (`--color-priority-low`)\r
- None: Gray family (`--color-priority-none`)\r
\r
### Spacing Scale\r
Use an 8pt grid system:\r
- `--spacing-xs`: 4px\r
- `--spacing-sm`: 8px\r
- `--spacing-md`: 16px\r
- `--spacing-lg`: 24px\r
- `--spacing-xl`: 32px\r
- `--spacing-2xl`: 48px\r
- `--spacing-3xl`: 64px\r
\r
